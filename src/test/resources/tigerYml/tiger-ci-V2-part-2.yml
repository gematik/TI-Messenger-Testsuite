      - info.app.clientInfo.canSendMessages=true
      - info.app.clientInfo.isInsurance=false
      - info.app.clientInfo.isPro=true
      - spring.application.name=D_Windows_Pro
      - db.port=${TIM_DB_PORT_V2_PART_2:5434}
      - db.host=${docker.host.hostname:localhost}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
      - matrix.client.versions=r0.0.1,r0.1.0,r0.2.0,r0.3.0,r0.4.0,r0.5.0,r0.6.0,r0.6.1,v1.1,v1.2,v1.3,v1.11

