# default local Tiger Proxy
tigerProxy:
  tls:
    forwardMutualTlsIdentity: "${TIM_KEYSTORE};${TIM_KEYSTORE_PW};pkcs12"

servers:
  testdriverApi-D-AND-Insurant-Part-2:
    type: externalJar
    startupTimeoutSec: 240
    source:
      - "local:../../../../targetV2part2/testdriverSim.jar"
    healthcheckUrl: https://127.0.0.1:8094/actuator/health
    environment:
      - SERVER_PORT=8094
      - info.app.title=d_and_insurant
      - info.app.homeserver=https://localhost:8094
      - info.app.clientInfo.canAdministrateFhirOrganization=false
      - info.app.clientInfo.canAdministrateFhirPractitioner=false
      - info.app.clientInfo.canSendMessages=true
      - info.app.clientInfo.isInsurance=true
      - info.app.clientInfo.isPro=false
      - spring.application.name=D_Android_Insurant
      - db.port=${TIM_DB_PORT_V2_PART_2:5434}
      - db.host=${docker.host.hostname:localhost}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
      - matrix.client.versions=r0.0.1,r0.1.0,r0.2.0,r0.3.0,r0.4.0,r0.5.0,r0.6.0,r0.6.1,v1.1,v1.2,v1.3,v1.11,v1.12

