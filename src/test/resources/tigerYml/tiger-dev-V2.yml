# default local Tiger Proxy
tigerProxy:
  tls:
    forwardMutualTlsIdentity: "${TIM_KEYSTORE};${TIM_KEYSTORE_PW};pkcs12"

servers:
  testdriverApi-C-IOS-Insurant:
    type: externalUrl
    source:
      - https://127.0.0.1:8084
    healthcheckUrl: https://127.0.0.1:8084/actuator/health

  testdriverApi-D-WIN-Pro:
    type: externalUrl
    source:
      - https://127.0.0.1:8085
    healthcheckUrl: https://127.0.0.1:8085/actuator/health

  testdriverApi-D-ORG:
    type: externalUrl
    dependsUpon: testdriverApi-D-WIN-Pro
    source:
      - https://127.0.0.1:8086
    healthcheckUrl: https://127.0.0.1:8086/actuator/health

  testdriverApi-E-WIN-Pro:
    type: externalUrl
    source:
      - https://127.0.0.1:8087
    healthcheckUrl: https://127.0.0.1:8087/actuator/health

  testdriverApi-E-ORG:
    type: externalUrl
    dependsUpon: testdriverApi-E-WIN-Pro
    source:
      - https://127.0.0.1:8088
    healthcheckUrl: https://127.0.0.1:8088/actuator/health