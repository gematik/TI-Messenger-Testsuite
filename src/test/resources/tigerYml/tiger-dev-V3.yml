# default local Tiger Proxy
tigerProxy:
  tls:
    forwardMutualTlsIdentity: "${TIM_KEYSTORE};${TIM_KEYSTORE_PW};pkcs12"

servers:
  testdriverApi-F-AND-Insurant-V3:
    type: externalUrl
    source:
      - https://127.0.0.1:8089
    healthcheckUrl: https://127.0.0.1:8089/actuator/health

  testdriverApi-G-AND-Pro-V3:
    type: externalUrl
    source:
      - https://127.0.0.1:8090
    healthcheckUrl: https://127.0.0.1:8090/actuator/health

  testdriverApi-G-ORG:
    type: externalUrl
    dependsUpon: testdriverApi-G-AND-Pro-V3
    source:
      - https://127.0.0.1:8091
    healthcheckUrl: https://127.0.0.1:8091/actuator/health

  testdriverApi-H-AND-Ref-Impl:
    type: externalUrl
    source:
      - https://127.0.0.1:8092
    healthcheckUrl: https://127.0.0.1:8092/actuator/health

  testdriverApi-H-ORG:
    type: externalUrl
    dependsUpon: testdriverApi-H-AND-Ref-Impl
    source:
      - https://127.0.0.1:8093
    healthcheckUrl: https://127.0.0.1:8093/actuator/health
