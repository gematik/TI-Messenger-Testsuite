# default local Tiger Proxy
tigerProxy:
  tls:
    forwardMutualTlsIdentity: "${TIM_KEYSTORE};${TIM_KEYSTORE_PW};pkcs12"

servers:
  testdriverApi-A-WIN-Client:
    type: externalJar
    startupTimeoutSec: 240
    source:
      - "local:target11x/testdriverSim.jar"
    healthcheckUrl: https://127.0.0.1:8080/actuator/health
    environment:
      - SERVER_PORT=8080
      - info.app.title=a_win_c
      - info.app.homeserver=https://localhost:8080
      - info.app.clientInfo.canAdministrateFhirOrganization=false
      - info.app.clientInfo.canAdministrateFhirPractitioner=true
      - info.app.clientInfo.canSendMessages=true
      - info.app.clientInfo.isInsurance=false
      - info.app.clientInfo.isPro=false
      - spring.application.name=A_Windows_Client
      - db.port=${TIM_DB_PORT:5432}
      - db.host=${docker.host.hostname:localhost}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m

  testdriverApi-A-ORG:
    type: externalJar
    dependsUpon: testdriverApi-A-WIN-Client
    startupTimeoutSec: 240
    source:
      - "local:target11x/testdriverSim.jar"
    healthcheckUrl: https://127.0.0.1:8081/actuator/health
    environment:
      - SERVER_PORT=8081
      - info.app.title=a_org
      - info.app.homeserver=https://localhost:8080
      - info.app.clientInfo.canAdministrateFhirOrganization=true
      - info.app.clientInfo.canAdministrateFhirPractitioner=false
      - info.app.clientInfo.canSendMessages=false
      - info.app.clientInfo.isInsurance=false
      - info.app.clientInfo.isPro=false
      - spring.application.name=A_ORG
      - db.port=${TIM_DB_PORT:5432}
      - db.host=${docker.host.hostname:localhost}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m

  testdriverApi-B-WIN-Client:
    type: externalJar
    dependsUpon: testdriverApi-A-ORG
    startupTimeoutSec: 240
    source:
      - "local:target11x/testdriverSim.jar"
    healthcheckUrl: https://127.0.0.1:8082/actuator/health
    environment:
      - SERVER_PORT=8082
      - info.app.title=b_win_c
      - info.app.homeserver=https://localhost:8082
      - info.app.clientInfo.canAdministrateFhirOrganization=false
      - info.app.clientInfo.canAdministrateFhirPractitioner=true
      - info.app.clientInfo.canSendMessages=true
      - info.app.clientInfo.isInsurance=false
      - info.app.clientInfo.isPro=false
      - spring.application.name=B_Windows_Client
      - db.port=${TIM_DB_PORT:5432}
      - db.host=${docker.host.hostname:localhost}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m

  testdriverApi-B-ORG:
    type: externalJar
    dependsUpon: testdriverApi-B-WIN-Client
    startupTimeoutSec: 240
    source:
      - "local:target11x/testdriverSim.jar"
    healthcheckUrl: https://127.0.0.1:8083/actuator/health
    environment:
      - SERVER_PORT=8083
      - info.app.title=b_org
      - info.app.homeserver=https://localhost:8082
      - info.app.clientInfo.canAdministrateFhirOrganization=true
      - info.app.clientInfo.canAdministrateFhirPractitioner=false
      - info.app.clientInfo.canSendMessages=false
      - info.app.clientInfo.isInsurance=false
      - info.app.clientInfo.isPro=false
      - spring.application.name=B_ORG
      - db.port=${TIM_DB_PORT:5432}
      - db.host=${docker.host.hostname:localhost}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
