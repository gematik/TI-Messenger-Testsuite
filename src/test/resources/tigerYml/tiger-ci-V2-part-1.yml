# default local Tiger Proxy
tigerProxy:
  tls:
    forwardMutualTlsIdentity: "${TIM_KEYSTORE};${TIM_KEYSTORE_PW};pkcs12"

servers:
  testdriverApi-C-IOS-Insurant-Part-1:
    type: externalJar
    startupTimeoutSec: 240
    source:
      - "local:targetV2part1/testdriverSim.jar"
    healthcheckUrl: https://127.0.0.1:8084/actuator/health
    environment:
      - SERVER_PORT=8084
      - info.app.title=c_ios_insurant
      - info.app.homeserver=https://localhost:8084
      - info.app.clientInfo.canAdministrateFhirOrganization=false
      - info.app.clientInfo.canAdministrateFhirPractitioner=false
      - info.app.clientInfo.canSendMessages=true
      - info.app.clientInfo.isInsurance=true
      - info.app.clientInfo.isPro=false
      - spring.application.name=C_IOS_Insurant
      - db.port=${TIM_DB_PORT_V2_PART_1:5433}
      - db.host=${docker.host.hostname:localhost}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
      - matrix.client.versions=r0.0.1,r0.1.0,r0.2.0,r0.3.0,r0.4.0,r0.5.0,r0.6.0,r0.6.1,v1.1,v1.2,v1.3,v1.11

  testdriverApi-D-WIN-Pro-Part-1:
    type: externalJar
    dependsUpon: testdriverApi-C-IOS-Insurant-Part-1
    startupTimeoutSec: 240
